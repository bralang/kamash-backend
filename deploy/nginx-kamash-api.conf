# Server block for the dedicated API subdomain, replacing n8n.link-up.co.il/webhook/kamash/*
# for every endpoint at once. Install alongside the existing n8n vhost (don't touch it) —
# this is a brand new subdomain, so it needs its own DNS A/CNAME record pointing at this
# server before nginx + certbot will work.
#
# Install:
#   1. DNS: point kamash-api.link-up.co.il at this server's IP.
#   2. Copy this file to /etc/nginx/sites-available/kamash-api.link-up.co.il (or the
#      aaPanel-managed vhost path) and symlink into sites-enabled.
#   3. sudo certbot --nginx -d kamash-api.link-up.co.il   (obtains + wires up TLS; certbot
#      will rewrite the server block below to add the ssl_certificate lines and an HTTP->
#      HTTPS redirect automatically — the plain-HTTP block below is deliberately minimal
#      so certbot can do that).
#   4. nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name kamash-api.link-up.co.il;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # step1 accepts audio uploads up to 100MB (see src/middleware/upload.ts) — must be
        # at least that large or nginx will reject the upload before it reaches Node.
        client_max_body_size 100M;
    }
}
